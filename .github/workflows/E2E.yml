name: Selenium E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  testes-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r saucedemo-e2e/requirements.txt

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Rodar testes
        run: |
          cd saucedemo-e2e
          python -m pytest tests/ --html=reports/relatorio.html --self-contained-html -v

      - name: Publicar relatório HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: saucedemo-e2e/reports/relatorio.html